#
# characters:
#   <group>:
#     <name>: { <without_shift>, <with_shift> }
#
characters:
#   moon:
#     complete:  { new:     "🌑", full:    "🌕" }
#     gibbous:   { waning:  "🌖", waxing:  "🌔" }
#     quarter:   { waning:  "🌗", waxing:  "🌓" }
#     crescent:  { waning:  "🌘", waxing:  "🌒" }
#     stars:     { sparkle: "✨", magic:   "🪄" }
#   face:
#     smile:     { up:      "🙂", down:    "🙃" }
#     laugh:     { joy:     "😂", rofl:    "🤣" }
#     eyes:      { star:    "🤩", heart:   "😍" }
#     joke:      { wink:    "😉", tounge:  "😜" }
#     fear:      { scared:  "😨", scream:  "😱" }
#     surprise:  { shocked: "🤯", dizzy:   "😵" }
  gesture:
    attention: { snap:    "🫰", wave:    "👋" }
    approval:  { perfect: "👌", cool:    "😎" }
    gratitude: { pray:    "🙏", salute:  "🫡" }
    anxiety:   { smile:   "😅", rushed:  "😰" }
    despair:   { sad:     "😞", cry:     "😢" }
    curious:   { think:   "🤔", analyze: "🧐" }
    point:     { up:      "☝️", you:     "🫵" }
    thumbs:    { up:      "👍", down:    "👎" }
    hands:     { up:      "🙌", clap:    "👏" }
  arrow:
    vertical:   { up:      "↑", down:     "↓" }
    horizontal: { left:    "←", right:    "→" }
    direction:  { forward: "↪", backward: "↩" }
    edit:       { undo:    "↺", redo:     "↻" } 



#
# codepoints:
#   <name>: "<string_of_unicode_characters>"
#
